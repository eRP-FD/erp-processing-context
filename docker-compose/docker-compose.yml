services:
  # --------------------------------------------------------------------------------
  # HSM Simulator
  # --------------------------------------------------------------------------------
  hsm-simulator-1:
    hostname: com.ibm.erp.hsm-simulator
    image: de.icr.io/erp_dev/vau-hsm:v-2.20.0-B101
    container_name: erp-hsm-simulator-1
    environment:
      SIMULATOR_PORT: 3001
    ports:
      - "9000:3001"

  # --------------------------------------------------------------------------------
  # TPM Server (tpm server port 2321, platform server port 2322)
  # --------------------------------------------------------------------------------
  tpm-server:
    hostname: com.ibm.erp.tpm-server
    image: de.icr.io/erp_dev/tpm-client:v-0.15.0-B44
    container_name: erp-tpm-server
    ports:
      - "9002:2321"
      - "9003:2322"
    environment:
      TPM_INTERFACE_TYPE: socsim

  # --------------------------------------------------------------------------------
  # Redis server
  # --------------------------------------------------------------------------------
  redis-server:
    hostname: com.ibm.erp.redis-server
    image: de.icr.io/erp_dev/redis:6.0.11
    container_name: erp-redis-server
    ports:
      - "9004:6379"
    volumes:
      - './redis:/data:Z'
      - './tls:/tls:z'
    command: ["/usr/local/bin/redis-server", "/data/redis.conf", "--port 0", "--tls-port 6379", "--tls-cert-file /tls/server.crt", "--tls-key-file /tls/server.key", "--tls-auth-clients no", "--protected-mode no", "--tls-ca-cert-file /tls/rootCA.crt"]

  # --------------------------------------------------------------------------------
  # Postgres primary node
  # --------------------------------------------------------------------------------
  postgres-primary:
    hostname: postgres-erp
    image: de.icr.io/erp_dev/postgres-docker:v-2.20.0-B00
    container_name: erp-postgres-primary
    ports:
      - "9005:5432"
    environment:
      POSTGRES_HOST_AUTH_METHOD: 'trust'
      POSTGRES_DB: 'erp_processing_context'
      POSTGRES_USER: 'erp_admin'
      POSTGRES_PASSWORD: 'erp0815'
    volumes:
      - './tls:/tls:z'
      - './postgres:/erp/config:z'
    entrypoint: >
      /bin/bash -c "
      install -o postgres -m 600 /tls/server.key /erp/secrets/server.key &&
      install -o postgres -m 644 /tls/server.crt /erp/secrets/server.crt &&
      docker-entrypoint.sh
      -c config_file=/erp/config/postgresql-primary.conf
      -c hba_file=/erp/config/pg_hba.conf
      "
    # set log_statement=all to get detailed output

  # --------------------------------------------------------------------------------
  # Postgres replica node (streaming hot-standby replication from postgres-primary)
  # --------------------------------------------------------------------------------
  postgres-replica:
    hostname: postgres-replica
    image: de.icr.io/erp_dev/postgres-docker:v-2.20.0-B00
    container_name: erp-postgres-replica
    ports:
      - "9007:5432"
    depends_on:
      - postgres-primary
    environment:
      PGPASSWORD: 'erp0815'
      PRIMARY_HOST: postgres-erp
      PRIMARY_PORT: 5432
      REPLICATION_USER: 'erp_admin'
    volumes:
      - './tls:/tls:z'
      - './postgres:/erp/config:z'
    entrypoint: >
      /bin/bash -c "
      install -o postgres -m 600 /tls/server.key /erp/secrets/server.key &&
      install -o postgres -m 644 /tls/server.crt /erp/secrets/server.crt &&
      docker-entrypoint-standby.sh
      -c config_file=/erp/config/postgresql-standby.conf"
    # set log_statement=all to get detailed output

  # --------------------------------------------------------------------------------
  # Postgres
  # --------------------------------------------------------------------------------
  postgres-erp-medication-exporter:
    hostname: postgres-exporter
    image: de.icr.io/erp_dev/postgres-docker:v-2.20.0-B00
    container_name: erp-postgres-medication-exporter
    ports:
      - "9006:5433"
    environment:
      POSTGRES_HOST_AUTH_METHOD: 'trust'
      POSTGRES_DB: 'erp_event_db'
      POSTGRES_USER: 'erp_admin'
      POSTGRES_PASSWORD: 'erp0815'
      PGPORT: '5433'
    volumes:
      - './tls:/tls:z'
      - './postgres:/erp/config:z'
    entrypoint: >
      /bin/bash -c "
      install -o postgres -m 600 /tls/server.key /erp/secrets/server.key &&
      install -o postgres -m 644 /tls/server.crt /erp/secrets/server.crt &&
      docker-entrypoint.sh
      -c config_file=/erp/config/postgresql.conf"
    # set log_statement=all to get detailed output

  # --------------------------------------------------------------------------------
  # Postgres database schema import
  # --------------------------------------------------------------------------------
  db-schema:
    image: postgres:16
    container_name: erp-postgres-schema
    volumes:
      - './tls:/tls:z'
      - '../scripts:/data:Z'
    depends_on:
      - postgres-primary
      - postgres-erp-medication-exporter
    environment:
      PGPASSWORD: 'erp0815'
      PGSSLROOTCERT: '/tls/rootCA.crt'
    entrypoint: >
      /bin/bash -c "
      while true ;
          do echo 'Waiting for postgresql' ;
          psql -p 5432 -U erp_admin -d erp_processing_context -h postgres-erp -c '\\q' ;
          if [ $$? -eq 0 ] ; then
              break ;
          fi ;
          sleep 0.5 ;
      done ;
      while true ;
          do echo 'Waiting for postgresql' ;
          psql -p 5433 -U erp_admin -d erp_event_db -h postgres-exporter -c '\\q' ;
          if [ $$? -eq 0 ] ; then
              break ;
          fi ;
          sleep 0.5 ;
      done ;
      /data/reset_database.sh postgres-erp 5432 erp_processing_context erp_admin erp0815 ;
      /data/reset_event_database.sh postgres-exporter 5433 erp_event_db erp_admin erp0815 erp_processing_context postgres-erp 5432 erp_admin erp0815"

  # --------------------------------------------------------------------------------
  # epa-test-mock
  # --------------------------------------------------------------------------------
  epa-test-mock:
    image: de.icr.io/erp_dev/epa-test-mock:v-0.108.0
    container_name: epa-test-mock
    ports:
      - "18888:8888"
    command: [ "srv.yaml", "/opt/epamock/cfg/lzcfg.yaml" ]
    volumes:
      - './epa-test-mock/lzconfig/lzcfg.yaml:/opt/epamock/cfg/lzcfg.yaml:Z'
      - './epa-test-mock/srv-local.yaml:/opt/epamock/bin/srv.yaml:Z'
      - './epa-test-mock/templates/:/opt/epamock/lzconfig/templates/:Z'
      - './epa-test-mock/ocsp-response-vau-sig.der:/opt/epamock/ocsp-response-vau-sig.der:Z'
      - './epa-test-mock/ocsp-response-vau-sig.der:/opt/epamock/tisim-pki/ocsp-response-vau-sig.der:Z'
      - './epa-test-mock/ocsp-response-tls-epa-as-mock.der:/opt/epamock/tisim-pki/ocsp-response-tls-epa-as-mock.der:Z'

  # --------------------------------------------------------------------------------
  # bfarm-test-mock
  # --------------------------------------------------------------------------------
  bfarm-test-mock:
    image: de.icr.io/erp_dev/bfarm-test-mock:v-0.14.0
    container_name: bfarm-test-mock
    ports:
      - "18443:8443"
    environment:
      QUARKUS_HTTP_SSL_CERTIFICATE_KEY_STORE_FILE: /tls/keystore.p12
      QUARKUS_HTTP_SSL_CERTIFICATE_KEY_STORE_PASSWORD: changeit
      BFARM_LCFG_FILE: /opt/bfarmmock/lzconfig/lz-config.json
      BFARM_TEMPLATE_PATH: /opt/bfarmmock/lzconfig/templates
      BFARM_SRV_FILE: /opt/bfarmmock/config/srv.yaml
    volumes:
      - ./bfarm/tls/keystore.p12:/tls/keystore.p12:ro,Z
      - ./bfarm/lz-config.json:/opt/bfarmmock/lzconfig/lz-config.json:Z
      - ./bfarm/templates:/opt/bfarmmock/lzconfig/templates:Z
      - ./bfarm/srv.yaml:/opt/bfarmmock/config/srv.yaml:Z
